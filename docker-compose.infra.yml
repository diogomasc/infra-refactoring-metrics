# --- Stack de observabilidade do TCC ---
# Componentes: Prometheus, Grafana e K6
#
# Execute a partir da raiz do projeto:
#   docker compose -f infra/docker-compose.infra.yml up -d
#
# Para derrubar:
#   docker compose -f infra/docker-compose.infra.yml down
#
# Para rodar os testes de carga (K6):
#   docker compose -f infra/docker-compose.infra.yml \
#     --profile testing run --rm k6 run /scripts/load-test.js

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Coleta métricas Micrometer do Spring Boot via /actuator/prometheus.
  # host.docker.internal aponta para a aplicação rodando no host (porta 8080).
  prometheus:
    image: prom/prometheus:latest
    container_name: tcc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tcc-infra
      - tcc-api-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Dashboards de runtime: latência p50/p95/p99, throughput, taxa de erro.
  # Datasource Prometheus pré-provisionado automaticamente.
  grafana:
    image: grafana/grafana:latest
    container_name: tcc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - tcc-infra
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── K6 (testes de carga — sob demanda) ─────────────────────────────────────
  # Só sobe quando o profile testing é habilitado (não inicia com up -d).
  # Execute: docker compose -f infra/docker-compose.infra.yml \
  #            --profile testing run --rm k6 run /scripts/load-test.js
  # ── K6 (testes de carga — sob demanda) ───────────────────────────────────────
  # MODO PRIMÁRIO: via run-benchmark.sh (docker run --network host).
  # Este serviço é mantido como alternativa para execução via compose.
  # network_mode: host elimina NAT overhead nos percentis P95/P99.
  k6:
    image: grafana/k6:latest
    container_name: tcc-k6
    profiles: ["testing"]
    network_mode: host
    volumes:
      - ./k6:/scripts:ro

# ── Volumes persistentes ────────────────────────────────────────────────────
# Mantêm dados entre reinícios do stack.
volumes:
  prometheus_data:
  grafana_data:

# ── Rede isolada ────────────────────────────────────────────────────────────
# Evita colisão com outras redes Docker no host.
networks:
  tcc-infra:
    driver: bridge
  tcc-api-net:
    external: true
    name: tcc-api-net

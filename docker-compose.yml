# --- Stack de observabilidade do TCC ---
# Componentes: Prometheus, Grafana, Loki, Promtail e K6
#
# Execute a partir do diretório infra/:
#   docker compose up -d
#
# Para derrubar:
#   docker compose down -v
#
# Para rodar os testes de carga (K6):
#   docker compose --profile testing run --rm k6 run /scripts/load-test.js

services:
  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Coleta métricas Micrometer do Spring Boot via /actuator/prometheus.
  # host.docker.internal aponta para a aplicação rodando no host (porta 8080).
  prometheus:
    image: prom/prometheus:latest
    container_name: tcc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tcc-infra
      - tcc-api-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Grafana ────────────────────────────────────────────────────────────────
  # Dashboards de runtime: latência p50/p95/p99, throughput e taxa de erro.
  # Datasource Prometheus pré-provisionado automaticamente.
  grafana:
    image: grafana/grafana:latest
    container_name: tcc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - tcc-infra
      - tcc-api-net
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Loki (Agregação de Logs) ───────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: tcc-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - tcc-infra
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Promtail (Coletor de Logs do Docker) ───────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: tcc-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - tcc-infra
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M

  # ── K6 (testes de carga — sob demanda) ─────────────────────────────────────
  # Só sobe quando o profile testing é habilitado (não inicia com up -d).
  # MODO PRIMÁRIO: via run-benchmark.sh (docker run --network host).
  # network_mode: host elimina NAT overhead nos percentis P95/P99.
  k6:
    image: grafana/k6:latest
    container_name: tcc-k6
    profiles:
      - testing
    network_mode: host
    volumes:
      - ./k6:/scripts:ro

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:
  loki_data:

# ── Redes ────────────────────────────────────────────────────────────────────
networks:
  tcc-infra:
    driver: bridge

  tcc-api-net:
    external: true
    name: tcc-api-net
